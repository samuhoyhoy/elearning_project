{% extends "base.html" %}  <!-- base layout with navbar -->
{% block title %}Login{% endblock %}  <!-- set page title -->

<!-- main body content begins -->
{% block content %}  
<h1>Login to eLearning App</h1>

<!-- login form posts credentials to Django's auth view -->
<form method="post" action="{% url 'login' %}">
    {% csrf_token %}  
    {{ form.as_p }}  
    <button class="btn btn-primary" type="submit">Login</button>
</form>

<p><a href="{% url 'home' %}">Back to Home</a></p>  <!-- link back to landing page -->
{% endblock %}
