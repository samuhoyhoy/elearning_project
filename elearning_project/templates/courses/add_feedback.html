{% extends "base.html" %}  <!-- base layout with navbar -->
{% block title %}Leave Feedback{% endblock %}  <!-- set page title -->

<!-- content starts -->
{% block content %}  
<h1>Leave feedback for {{ course.title }}</h1>  
<form method="post">  
    {% csrf_token %}  
    {{ form.as_p }}  
    <button class="btn btn-primary" type="submit">Submit</button>
</form>

<p><a href="{% url 'student_dashboard' %}">Back to Student dashboard</a></p>  <!-- back to student dashboard -->
{% endblock %}
